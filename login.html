<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | RequestFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0b; --fg: #fafaf9; --muted: #71717a; --accent: #2dd4bf; --card: #1c1c1f; --border: #27272a; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .font-display { font-family: 'Bodoni Moda', serif; }
    .noise-overlay { position: fixed; inset: 0; pointer-events: none; opacity: 0.035; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; z-index: 10; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 14px 20px; border-radius: 8px; font-family: inherit; margin-bottom: 20px; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: var(--accent); }
    .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-primary { width: 100%; background: var(--accent); color: var(--bg); font-weight: 600; padding: 14px; border-radius: 8px; border: none; cursor: pointer; transition: transform 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="auth-card">
    <div class="text-center mb-8">
      <h1 class="font-display text-4xl font-bold mb-2">Welcome Back</h1>
      <p class="text-[var(--muted)]">Sign in to RequestFlow</p>
    </div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg text-sm mb-6 text-center">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-input" required placeholder="you@company.com">
      
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" required placeholder="••••••••">
      
      <button type="submit" class="btn-primary mt-2">Sign In</button>
    </form>
    <p class="text-center text-sm text-[var(--muted)] mt-6">
      Don't have an account? <a href="/register" class="text-[var(--accent)] hover:underline">Create one</a>
    </p>
  </div>
</body>
</html>
